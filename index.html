<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>P.lay S.tation 41</title>
  <script src="wasm_exec.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: #33ff99; /* subtle retro green */
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    #loading {
      font-size: 1.5em;
      text-align: center;
    }

    /* marching pixels */
    .pixels {
      display: inline-flex;
      gap: 6px;
      margin-left: 10px;
      vertical-align: middle;
    }

    .pixels span {
      width: 10px;
      height: 10px;
      background: #0a0; /* dim green */
      image-rendering: pixelated;
      animation: blink 1.2s infinite;
    }

    .pixels span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .pixels span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {
      0%, 80%, 100% {
        background: #0a0;
      }
      40% {
        background: #33ff99;
      }
    }
  </style>
</head>

<body>
  <div id="loading">
    Loading
    <span class="pixels">
      <span></span>
      <span></span>
      <span></span>
    </span>
  </div>

  <script>
    const go = new Go();

    WebAssembly.instantiateStreaming(fetch("play_station_41.wasm"), go.importObject)
      .then(result => {
        document.getElementById('loading').remove(); // remove loader
        go.run(result.instance); // start your game
      })
      .catch(err => {
        document.getElementById('loading').textContent = "Failed to load WASM!";
        console.error(err);
      });
  </script>
</body>
</html>
