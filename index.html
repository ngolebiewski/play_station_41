<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>P.lay S.tation 41</title>
  <script src="wasm_exec.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f380f; /* Game Boy green */
      color: #9bbc0f;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    #loading {
      font-size: 1.5em;
      text-align: center;
    }

    .bar {
      width: 160px;
      height: 16px;
      border: 3px solid #9bbc0f;
      margin-top: 12px;
      padding: 2px;
      box-sizing: border-box;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: #9bbc0f;
      image-rendering: pixelated;
    }
  </style>
</head>

<body>
  <div id="loading">
    Loading
    <div class="bar">
      <div class="fill"></div>
    </div>
  </div>

  <script>
    const go = new Go();
    const fill = document.querySelector('.fill');

    // 🟨 add stepped transition feel
    fill.style.transition = "width 0.2s steps(2, end)";

    async function loadWasmWithProgress() {
      const response = await fetch("play_station_41.wasm");

      const contentLength = response.headers.get('Content-Length');
      const total = contentLength ? parseInt(contentLength, 10) : 0;

      const reader = response.body.getReader();
      let received = 0;
      const chunks = [];

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        chunks.push(value);
        received += value.length;

        if (total) {
          const percent = received / total;

          // 🧠 Game Boy-style stepping (16 chunks)
          const steps = 16;
          const stepped = Math.floor(percent * steps) / steps;

          fill.style.width = (stepped * 100) + "%";
        }
      }

      // combine chunks into one buffer
      const wasmBytes = new Uint8Array(received);
      let position = 0;

      for (let chunk of chunks) {
        wasmBytes.set(chunk, position);
        position += chunk.length;
      }

      return WebAssembly.instantiate(wasmBytes, go.importObject);
    }

    loadWasmWithProgress()
      .then(result => {
        fill.style.width = "100%"; // ensure full

        setTimeout(() => {
          document.getElementById('loading').remove();
          go.run(result.instance);
        }, 300); // small pause feels good
      })
      .catch(err => {
        document.getElementById('loading').textContent = "Failed to load WASM!";
        console.error(err);
      });
  </script>
</body>

</html>
